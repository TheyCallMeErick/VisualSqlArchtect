name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.2.0)'
        required: true

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            asset_name:
          - rid: linux-arm64
            asset_name: 64
          - rid: win-x64
            asset_name: xe
          - rid: osx-x64
            asset_name:           - rid: osx-arm64
            asset_name:

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"

          dotnet publish src/er.U      --configuration Release \
            --runtime ${{ matrix.rid }} \
            --output ./dist/${{ matrix.rid }} \
            --self-contained \
            --property:PublishSingleFile=true \
            --property:IncludeNativeLibrariesForSelfExtract=true \
            --property:Version=$VERSION \
            --property:InformationalVersion=$VERSION \
            --property:DebugType=none \
            --property:DebugSymbols=false

      - name: Rename binary
        run: |
          src=$(find ./dist/${{ matrix.rid }} -maxdepth 1 -type f -name 'ad -1)
          mv "$src" ./dist/${{ matrix.rid }}/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./dist/${{ matrix.rid }}/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DBWeaver ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ./artifacts/**/*
